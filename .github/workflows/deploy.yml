name: Deploy to Production

on:
  push:
    branches: [main]

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  ci:
    uses: ./.github/workflows/ci.yml

  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    needs: [ci]
    environment: production

    steps:
      - uses: actions/checkout@v4

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ secrets.VPS_HOST }} >> ~/.ssh/known_hosts

      - name: Sync code to VPS
        run: |
          rsync -az --delete \
            --exclude='.git' \
            --exclude='__pycache__' \
            --exclude='*.pyc' \
            --exclude='.env*' \
            --exclude='data/' \
            --exclude='frontend/node_modules' \
            --exclude='frontend/dist' \
            --exclude='bettracker.db' \
            -e "ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no" \
            ./ ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:/opt/bettracker/

      - name: Install, build, and restart services
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -e
            cd /opt/bettracker

            echo "-> Installing Python dependencies..."
            uv sync --frozen --no-dev

            echo "-> Building frontend..."
            cd frontend && npm ci && npm run build && cd ..

            echo "-> Running DB migrations..."
            uv run alembic upgrade head

            echo "-> Restarting services..."
            sudo systemctl restart bettracker-api
            sudo systemctl restart bettracker-worker

            echo "-> Health check..."
            sleep 3
            curl -sf http://localhost:8000/health

            echo "-> Deployment complete"
