# Production override — run with:
#   docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d --build
#
# Requires:
#   - DOMAIN=bettracker.example.com in .env
#   - DNS A record pointing to your server IP
#   - All API keys set in .env

services:
  # Caddy reverse proxy — auto HTTPS via Let's Encrypt
  caddy:
    image: caddy:2-alpine
    ports:
      - "80:80"
      - "443:443"
    environment:
      - DOMAIN=${DOMAIN:?DOMAIN must be set}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    depends_on:
      frontend:
        condition: service_started
    restart: unless-stopped

  # Override frontend: don't expose port 80 directly (Caddy handles it)
  frontend:
    ports: !override []

  # Override backend: don't expose port 8000 directly
  backend:
    ports: !override []
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER:-bettracker}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-bettracker}
      - REDIS_URL=redis://redis:6379/0
      - JWT_SECRET_KEY=${JWT_SECRET_KEY:?JWT_SECRET_KEY must be set in environment}
      - ODDS_API_KEY=${ODDS_API_KEY:-}
      - API_FOOTBALL_KEY=${API_FOOTBALL_KEY:-}
      - OPENWEATHER_API_KEY=${OPENWEATHER_API_KEY:-}
      - RESEND_API_KEY=${RESEND_API_KEY:-}
      - FRONTEND_URL=https://${DOMAIN:?DOMAIN must be set}
      - ALLOWED_ORIGINS=["https://${DOMAIN}"]

  # Override worker: production env
  worker:
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER:-bettracker}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-bettracker}
      - REDIS_URL=redis://redis:6379/0
      - JWT_SECRET_KEY=${JWT_SECRET_KEY:?JWT_SECRET_KEY must be set in environment}
      - ODDS_API_KEY=${ODDS_API_KEY:-}
      - API_FOOTBALL_KEY=${API_FOOTBALL_KEY:-}
      - OPENWEATHER_API_KEY=${OPENWEATHER_API_KEY:-}

  # Override postgres: no exposed port in prod
  postgres:
    ports: !override []

  # Override redis: no exposed port in prod
  redis:
    ports: !override []

volumes:
  caddy-data:
  caddy-config:
