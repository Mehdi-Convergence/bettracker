name: Deploy to Production

on:
  push:
    branches: [main]

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  ci:
    uses: ./.github/workflows/ci.yml

  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    needs: [ci]
    environment: production

    steps:
      - uses: actions/checkout@v4

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ secrets.VPS_HOST }} >> ~/.ssh/known_hosts

      - name: Sync code to VPS
        run: |
          rsync -az --delete \
            --exclude='.git' \
            --exclude='__pycache__' \
            --exclude='*.pyc' \
            --exclude='.env*' \
            --exclude='data/' \
            --exclude='frontend/node_modules' \
            --exclude='frontend/dist' \
            --exclude='bettracker.db' \
            -e "ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no" \
            ./ ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:/opt/bettracker/

      - name: Install, build, and restart services
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -e
            export PATH="$HOME/.local/bin:$HOME/.cargo/bin:/usr/local/bin:$PATH"
            export NVM_DIR="$HOME/.nvm"
            [ -s "$NVM_DIR/nvm.sh" ] && . "$NVM_DIR/nvm.sh"

            echo "-> Ensuring uv is installed..."
            if ! command -v uv &>/dev/null; then
              curl -LsSf https://astral.sh/uv/install.sh | sh
              export PATH="$HOME/.local/bin:$PATH"
            fi

            echo "-> Ensuring Node.js is installed..."
            if ! command -v node &>/dev/null; then
              curl -fsSL https://deb.nodesource.com/setup_22.x | sudo -E bash -
              sudo apt-get install -y nodejs
            fi

            cd /opt/bettracker

            echo "-> Installing Python dependencies..."
            if [ -d .venv ] && ! .venv/bin/python --version &>/dev/null; then
              echo "-> Removing invalid .venv..."
              rm -rf .venv
            fi
            uv sync --no-dev

            echo "-> Building frontend..."
            cd frontend && npm ci && npm run build && cd ..

            echo "-> Running DB migrations..."
            uv run alembic upgrade head || echo "WARNING: migrations skipped"

            echo "-> Installing systemd services..."
            sudo cp deploy/bettracker-api.service /etc/systemd/system/
            sudo cp deploy/bettracker-worker.service /etc/systemd/system/
            sudo systemctl daemon-reload
            sudo systemctl enable bettracker-api bettracker-worker

            echo "-> Restarting services..."
            sudo systemctl restart bettracker-api
            sudo systemctl restart bettracker-worker || echo "WARNING: worker restart skipped"

            echo "-> Health check..."
            sleep 3
            curl -sf http://localhost:8000/health || echo "WARNING: health check failed"

            echo "-> Deployment complete"
